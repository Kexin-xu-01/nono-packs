name: Publish claude pack
on:
  push:
    tags:
      - "claude-v*"
  workflow_dispatch: 
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: always-further/agent-sign@c9426f1a00f823dd53e7b9068d910a68b43e49e9 # v0.0.11
        with:
          publish: "true"
          package-name: claude
          package-namespace: always-further
          package-version: ${{ github.ref_name }}
          package-path: claude
          registry-url: https://registry.nono.sh/api/v1
          files: |
            .claude-plugin/plugin.json
            skills/nono-sandbox/SKILL.md
            bin/nono-hook-bash.sh
            package.json
            policy.json
            README.md

